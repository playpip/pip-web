name: Build and Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The test:all gate, one step per check so a failure names its culprit.
      - name: Check formatting
        run: pnpm test:format

      - name: Check types
        run: pnpm test:types

      - name: Lint
        run: pnpm test:lint

      - name: Run engine tests (AVA)
        run: pnpm test:ava

      - name: Check for unused code (knip)
        run: pnpm test:knip

      - name: Security audit
        run: pnpm test:audit

      - name: Build static export
        run: pnpm build

      # Plain npx rather than wrangler-action: the action installs wrangler via
      # the repo's package manager, and pnpm 11 blocks workerd's build script.
      - name: Publish to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4 pages deploy out --project-name=pip-web --branch=main
