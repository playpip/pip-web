<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- canvas: near-black, faint top glow -->
    <radialGradient id="canvas" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#1b1c2b"/>
      <stop offset="55%" stop-color="#101018"/>
      <stop offset="100%" stop-color="#0a0a0b"/>
    </radialGradient>
    <!-- chip top face: soft top-left light, matte -->
    <radialGradient id="face" cx="42%" cy="34%" r="78%">
      <stop offset="0%" stop-color="#a9b4f6"/>
      <stop offset="48%" stop-color="#8593f2"/>
      <stop offset="100%" stop-color="#6273e6"/>
    </radialGradient>
    <!-- chip edge thickness -->
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5566d8"/>
      <stop offset="100%" stop-color="#3d4cb0"/>
    </linearGradient>
    <!-- recessed centre well -->
    <radialGradient id="well" cx="50%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#7382ee"/>
      <stop offset="100%" stop-color="#5a6ad9"/>
    </radialGradient>
    <filter id="contact" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5"/>
    </filter>
  </defs>

  <!-- canvas -->
  <rect width="512" height="512" rx="0" fill="url(#canvas)"/>

  <g transform="translate(256 256) scale(0.82) translate(-256 -256)">
<!-- contact shadow on canvas -->
  <ellipse cx="256" cy="292" rx="176" ry="176" fill="#000000" opacity="0.55" filter="url(#contact)"/>

  <!-- chip edge (thickness) -->
  <circle cx="256" cy="271" r="176" fill="url(#edge)"/>

  <!-- chip top face -->
  <circle cx="256" cy="256" r="176" fill="url(#face)"/>
  <!-- top rim sheen -->
  <circle cx="256" cy="256" r="176" fill="none" stroke="#c3ccf9" stroke-width="3" opacity="0.5"/>

  <!-- edge tick spots (classic chip stripes) -->
  <g fill="#f4f6ff">
    <g id="ticks">
      <rect x="243" y="86" width="26" height="46" rx="13"/>
    </g>
    <use href="#ticks" transform="rotate(45 256 256)"/>
    <use href="#ticks" transform="rotate(90 256 256)"/>
    <use href="#ticks" transform="rotate(135 256 256)"/>
    <use href="#ticks" transform="rotate(180 256 256)"/>
    <use href="#ticks" transform="rotate(225 256 256)"/>
    <use href="#ticks" transform="rotate(270 256 256)"/>
    <use href="#ticks" transform="rotate(315 256 256)"/>
  </g>

  <!-- recessed centre well -->
  <circle cx="256" cy="256" r="120" fill="url(#well)"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="#c3ccf9" stroke-width="2" opacity="0.55"/>
  <circle cx="256" cy="256" r="116" fill="none" stroke="#46549c" stroke-width="3" opacity="0.5"/>

</g>
</svg>
